<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('新規作成')}"></head>

<body>
    <h1>NEW BLOG</h1>

    <header th:replace="~{fragments/layout :: header}"></header>
    
    <div class="newPost">
        <form action="/new" method="post">
            <label for="title">タイトル：</label>
            <input type="text" id="title" name="title" placeholder="タイトルを入力">

            <label for="contens">本文：</label>
            <!-- <input type="text" id="contens" name="contents" placeholder="本文を入力"> -->
             <textarea id="contens" name="contens" placeholder="本文を入力" rows="10"></textarea>
            
             <button class="newButton" type="submit">作成</button>
        </form>

        
        
        <a href="/blogs">戻る</a>

        
    </div>
    

   
</body>
</html>
